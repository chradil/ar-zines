<!-- include A-Frame obviously -->
<script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
<!-- include ar.js for A-Frame -->
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

<body style='margin : 0px; overflow: hidden;'>
  <a-scene embedded arjs='detectionMode: mono_and_matrix; matrixCodeType: 3x3;'>
    <!-- create your content here. just a box for now -->
  	<a-marker type='barcode' value='5'>
  		<a-entity gltf-model="#turtle" position='0 0.5 0' scale="0.75 0.75 0.75" animation-mixer="clip: Hide"></a-entity>
	</a-marker>

    <!-- define a camera which will move according to the marker position -->
    <a-marker-camera preset='hiro'></a-marker-camera>


    <a-assets>
    	<a-asset-item id="turtle" src="https://raw.githubusercontent.com/chradil/ar-zines/refs/heads/main/assets/hide-the-turtle/scene.gltf"></a-asset-item>
  	</a-assets>
  </a-scene>
</body>
