<!-- include A-Frame obviously -->
<script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
<!-- include ar.js for A-Frame -->
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>


<body style='margin : 0px; overflow: hidden;'>
  <a-scene embedded arjs='detectionMode: mono_and_matrix; matrixCodeType: 3x3;'>

    <!-- create your content here. -->
  	<a-marker class="animated-marker" type='barcode' value='1'>
        <a-entity gltf-model="#windy" position='0 0.5 0' scale="0.75 0.75 0.75" animation-mixer></a-entity>
    </a-marker>
    <a-marker class="animated-marker" type='barcode' value='2'>
        <a-entity gltf-model="#clouds" position='0 0.5 0' scale="0.25 0.25 0.25" animation-mixer></a-entity>
    </a-marker>
    <a-marker class="animated-marker" type='barcode' value='3'>
        <a-entity gltf-model="#chicken" position='0 0.1 0' scale="0.05 0.05 0.05" animation-mixer></a-entity>
    </a-marker>
    <a-marker class="animated-marker" type='barcode' value='4'>
        <a-entity gltf-model="#turtle" position='0 0.1 0' scale="0.75 0.75 0.75" animation-mixer="clip: Hide"></a-entity>
    </a-marker>
    <a-marker class="animated-marker" type='barcode' value='5'>
        <a-entity gltf-model="#robin" position='0 0.1 0' scale="8 8 8" animation-mixer></a-entity>
    </a-marker>
    <a-marker class="animated-marker" type='barcode' value='6'>
        <a-entity gltf-model="#owl" position='0 0.5 0' scale="1 1 1" animation-mixer></a-entity>
    </a-marker>
    <a-marker class="animated-marker" type='barcode' value='7'>
        <a-entity gltf-model="#melon" position='0 0.1 0' scale="20 20 20" animation-mixer></a-entity>
    </a-marker>
    <a-marker class="animated-marker" type='barcode' value='8'>
        <a-entity gltf-model="#eevee" position='0 0.1 0' scale="0.75 0.75 0.75" animation-mixer></a-entity>
    </a-marker>


    <!-- define a camera which will move according to the marker position -->
    <a-entity camera></a-entity>


    <!-- load assets d -->

    <a-assets>
    	<a-asset-item id="windy" src="https://raw.githubusercontent.com/chradil/ar-zines/refs/heads/main/assets/a_windy_day/scene.gltf"></a-asset-item>
      <a-asset-item id="clouds" src="https://raw.githubusercontent.com/chradil/ar-zines/refs/heads/main/assets/cloud_station/scene.gltf"></a-asset-item>
      <a-asset-item id="chicken" src="https://raw.githubusercontent.com/chradil/ar-zines/refs/heads/main/assets/halva_the_chicken/scene.gltf"></a-asset-item>
      <a-asset-item id="turtle" src="https://raw.githubusercontent.com/chradil/ar-zines/refs/heads/main/assets/hide-the-turtle/scene.gltf"></a-asset-item>
      <a-asset-item id="robin" src="https://raw.githubusercontent.com/chradil/ar-zines/refs/heads/main/assets/lowpoly_bird_robin/scene.gltf"></a-asset-item>
      <a-asset-item id="owl" src="https://raw.githubusercontent.com/chradil/ar-zines/refs/heads/main/assets/owl/scene.gltf"></a-asset-item>
      <a-asset-item id="melon" src="https://raw.githubusercontent.com/chradil/ar-zines/refs/heads/main/assets/painterly_brushwork_watermelon/scene.gltf"></a-asset-item>
      <a-asset-item id="eevee" src="https://raw.githubusercontent.com/chradil/ar-zines/refs/heads/main/assets/pokedex_3d_pro_eevee/scene.gltf"></a-asset-item>
  	</a-assets>
  </a-scene>
</body>
